{% with icon_color1='var(--chesf-primary)' icon_color2='var(--chesf-purple)' icon_color3='var(--chesf-sky)' icon_color4='var(--chesf-gold-dark)' icon_color5='var(--chesf-coral)' %}
<div class="stepper-chesf">
    <div class="step-item {% if current_step >= 1 %}active{% endif %} {% if application.section_a_completed %}completed{% endif %}">
        <div class="step-circle"><i class="fas fa-user"></i></div>
        <div class="step-label">Personal</div>
    </div>
    <div class="step-item {% if current_step >= 2 %}active{% endif %} {% if application.section_b_completed %}completed{% endif %}">
        <div class="step-circle"><i class="fas fa-school"></i></div>
        <div class="step-label">Schools</div>
    </div>
    <div class="step-item {% if current_step >= 3 %}active{% endif %} {% if application.section_c_completed %}completed{% endif %}">
        <div class="step-circle"><i class="fas fa-certificate"></i></div>
        <div class="step-label">SSCE</div>
    </div>
    <div class="step-item {% if current_step >= 4 %}active{% endif %} {% if application.section_d_completed %}completed{% endif %}">
        <div class="step-circle"><i class="fas fa-book"></i></div>
        <div class="step-label">Course</div>
    </div>
    <div class="step-item {% if current_step >= 5 %}active{% endif %} {% if application.section_e_completed %}completed{% endif %}">
        <div class="step-circle"><i class="fas fa-signature"></i></div>
        <div class="step-label">Submit</div>
    </div>
</div>
{% endwith %}
