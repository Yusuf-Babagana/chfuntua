<div class="col-md-6 col-lg-4 mb-3">
    <div class="card-chesf h-100">
        <div class="card-body p-4 position-relative overflow-hidden">
            {% if status %}
                <div class="position-absolute top-0 end-0 mt-3 me-3">
                    <i class="fas fa-check-circle" style="color:var(--chesf-success);font-size:1.3rem;"></i>
                </div>
            {% endif %}
            <div class="d-flex align-items-center gap-3 mb-3">
                <div style="width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;
                    {% if status %}background:rgba(16,185,129,0.1);color:var(--chesf-success);{% else %}background:rgba(15,118,110,0.1);color:var(--chesf-primary);{% endif %}">
                    <i class="fas fa-{{ icon }}"></i>
                </div>
                <h5 class="fw-bold mb-0" style="color:var(--chesf-text-dark);font-size:1rem;">{{ title }}</h5>
            </div>
            <div class="mt-3 pt-3 border-top" style="border-color:rgba(15,118,110,0.06)!important;">
                {% if status %}
                    <a href="{% url url %}" class="btn btn-chesf-light w-100">
                        <i class="fas fa-edit me-1"></i> Update
                    </a>
                {% else %}
                    <a href="{% url url %}" class="btn btn-chesf-primary w-100">
                        <i class="fas fa-arrow-right me-1"></i> Start
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
