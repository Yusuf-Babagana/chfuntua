<div class="col-md-6 col-lg-4 mb-3 fade-up fade-up-delay-{{ delay|default:1 }}">
    <div class="step-card {{ color_class }}{% if status %} completed{% endif %} h-100 d-flex flex-column">
        <div class="step-card-accent"></div>
        <div class="p-3 d-flex flex-column flex-grow-1">
            <div class="d-flex align-items-center gap-3 mb-3">
                <div class="step-card-icon">
                    <i class="fas fa-{{ icon }}"></i>
                </div>
                <h5 style="font-weight:700;color:var(--chesf-text-dark);font-size:0.92rem;margin-bottom:0;flex-grow:1;">{{ title }}</h5>
                {% if status %}
                    <i class="fas fa-check-circle" style="color:#059669;font-size:1.15rem;"></i>
                {% endif %}
            </div>
            <div class="mt-auto pt-3" style="border-top:1px solid var(--chesf-border);">
                {% if status %}
                    <a href="{% url url %}" class="step-card-btn step-card-btn-update">
                        <i class="fas fa-edit me-1"></i> Update
                    </a>
                {% else %}
                    <a href="{% url url %}" class="step-card-btn step-card-btn-start">
                        <i class="fas fa-arrow-right me-1"></i> Start Section
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
