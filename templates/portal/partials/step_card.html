<div class="col-md-6 col-lg-4 mb-3">
    <div class="card-chesf h-100">
        <div class="card-body p-4">
            {% if status %}
                <div style="float:right;">
                    <i class="fas fa-check-circle" style="color:var(--chesf-success);font-size:1.2rem;"></i>
                </div>
            {% endif %}
            <div class="d-flex align-items-center gap-3 mb-3">
                <div style="width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;
                    {% if status %}background:#F0FDF4;color:var(--chesf-success);{% else %}background:var(--chesf-bg);color:var(--chesf-primary);{% endif %}">
                    <i class="fas fa-{{ icon }}"></i>
                </div>
                <h5 style="font-weight:700;color:var(--chesf-navy-dark);font-size:0.95rem;margin-bottom:0;">{{ title }}</h5>
            </div>
            <div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--chesf-border);">
                {% if status %}
                    <a href="{% url url %}" class="btn btn-chesf-light w-100">
                        <i class="fas fa-edit me-1"></i> Update
                    </a>
                {% else %}
                    <a href="{% url url %}" class="btn btn-chesf-primary w-100">
                        <i class="fas fa-arrow-right me-1"></i> Start
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
