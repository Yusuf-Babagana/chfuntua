{% extends 'base.html' %}

{% block title %}Secure Payment - CHESF Admission{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center" style="min-height:50vh;">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="fade-up">
                <div class="card-chesf text-center">
                    <div class="card-body p-5">
                        <div style="width:64px;height:64px;border-radius:12px;background:var(--chesf-navy-dark);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;">
                            <i class="fas fa-credit-card fs-4" style="color:var(--chesf-gold);"></i>
                        </div>
                        <h3 style="font-weight:800;color:var(--chesf-navy-dark);margin-bottom:0.25rem;">Secure Payment</h3>
                        <div style="margin:1rem 0 1.25rem;">
                            <small style="color:var(--chesf-text-light);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;font-size:0.7rem;">Application Fee</small>
                            <h2 style="font-weight:900;color:var(--chesf-navy-dark);font-size:2.5rem;margin-bottom:0.25rem;">₦6,000</h2>
                            <p style="font-size:0.85rem;color:var(--chesf-text-light);margin-bottom:0;">Secured payment via Paystack</p>
                        </div>
                        <button id="pay-button" class="btn btn-chesf-primary w-100 py-3 mb-3">
                            <i class="fas fa-lock me-2"></i> Pay Securely Now
                        </button>
                        <div class="d-flex justify-content-center align-items-center gap-2">
                            <i class="fas fa-shield-alt" style="color:var(--chesf-success);font-size:1rem;"></i>
                            <small style="color:var(--chesf-text-light);">End-to-end encrypted</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
    document.getElementById('pay-button').addEventListener('click', function() {
        var handler = PaystackPop.setup({
            key: '{{ paystack_public_key }}',
            email: '{{ email }}',
            amount: {{ amount }},
            ref: '{{ reference }}',
            callback: function(response) {
                fetch('{% url "payment_callback" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        reference: response.reference
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        window.location.href = '{% url "dashboard" %}';
                    } else {
                        alert('Payment verification failed. Please contact support.');
                    }
                });
            },
            onClose: function() {
                alert('Payment window closed');
            }
        });
        handler.openIframe();
    });
</script>
{% endblock %}
