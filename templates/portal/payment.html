{% extends 'base.html' %}

{% block title %}Secure Payment - CHESF Admission{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center" style="min-height:50vh;">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="fade-up">
                <div class="card-chesf text-center">
                    <div class="card-body p-5">
                        <div style="width:60px;height:60px;border-radius:12px;background:var(--chesf-bg-alt);display:inline-flex;align-items:center;justify-content:center;margin-bottom:0.9rem;">
                            <i class="fas fa-credit-card fs-4" style="color:var(--chesf-text-light);"></i>
                        </div>
                        <h3 style="font-weight:800;color:var(--chesf-text-dark);margin-bottom:0.2rem;">Payment Unavailable</h3>
                        <div style="margin:0.9rem 0 1.15rem;">
                            <small style="color:var(--chesf-text-light);text-transform:uppercase;letter-spacing:0.4px;font-weight:600;font-size:0.68rem;">Application Fee</small>
                            <h2 style="font-weight:900;color:var(--chesf-text-light);font-size:2.4rem;margin-bottom:0.2rem;">₦6,000</h2>
                            <p style="font-size:0.82rem;color:var(--chesf-text-light);margin-bottom:0;">Online payments are currently disabled.</p>
                        </div>
                        <button id="pay-button" class="btn btn-chesf-primary w-100 py-3 mb-3" disabled style="opacity:0.5;cursor:not-allowed;background:var(--chesf-bg-alt);color:var(--chesf-text-light);border:1px solid var(--chesf-border);">
                            <i class="fas fa-lock me-2"></i> Payments Temporarily Unavailable
                        </button>
                        <div class="d-flex justify-content-center align-items-center gap-2">
                            <i class="fas fa-info-circle" style="color:var(--chesf-text-light);font-size:0.95rem;"></i>
                            <small style="color:var(--chesf-text-light);">Use a referral code instead</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    var payBtn = document.getElementById('pay-button');
    if (payBtn && !payBtn.disabled) {
        var script = document.createElement('script');
        script.src = 'https://js.paystack.co/v1/inline.js';
        document.head.appendChild(script);
        script.onload = function() {
            payBtn.addEventListener('click', function() {
                var handler = PaystackPop.setup({
                    key: '{{ paystack_public_key }}',
                    email: '{{ email }}',
                    amount: {{ amount }},
                    ref: '{{ reference }}',
                    callback: function(response) {
                        fetch('{% url "payment_callback" %}', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': '{{ csrf_token }}'
                            },
                            body: JSON.stringify({
                                reference: response.reference
                            })
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.status === 'success') {
                                window.location.href = '{% url "dashboard" %}';
                            } else {
                                alert('Payment verification failed. Please contact support.');
                            }
                        });
                    },
                    onClose: function() {
                        alert('Payment window closed');
                    }
                });
                handler.openIframe();
            });
        };
    }
</script>
{% endblock %}
