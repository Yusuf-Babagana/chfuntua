{% extends 'base.html' %}

{% block title %}Secure Payment - CHESF Admission{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height:60vh;">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="fade-up">
                <div class="card-chesf border-0 shadow-lg text-center">
                    <div class="pt-5 pb-0 px-4">
                        <div style="width:70px;height:70px;border-radius:16px;background:var(--chesf-gradient);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;box-shadow:0 8px 24px rgba(15,118,110,0.2);">
                            <i class="fas fa-credit-card fs-3 text-white"></i>
                        </div>
                        <h3 class="fw-bold" style="color:var(--chesf-text-dark);">Secure Payment</h3>
                    </div>
                    <div class="card-body p-4 p-md-5 pt-3">
                        <small style="color:var(--chesf-text-light);text-transform:uppercase;letter-spacing:1px;font-weight:600;font-size:0.75rem;">Application Fee</small>
                        <h1 class="display-5 fw-bold mb-2" style="color:var(--chesf-primary);">₦12,550</h1>
                        <p class="small mb-4" style="color:var(--chesf-text-light);">Secured inline payment via Paystack</p>
                        <button id="pay-button" class="btn btn-chesf-primary w-100 btn-chesf-lg btn-chesf-rounded mb-3 py-3 shadow-lg">
                            <i class="fas fa-lock me-2"></i> Pay Securely Now
                        </button>
                        <div class="d-flex justify-content-center align-items-center gap-2 mt-3">
                            <i class="fas fa-shield-alt" style="color:var(--chesf-success);font-size:1.2rem;"></i>
                            <small style="color:var(--chesf-text-light);">End-to-end encrypted</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
    document.getElementById('pay-button').addEventListener('click', function() {
        var handler = PaystackPop.setup({
            key: '{{ paystack_public_key }}',
            email: '{{ email }}',
            amount: {{ amount }},
            ref: '{{ reference }}',
            callback: function(response) {
                fetch('{% url "payment_callback" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        reference: response.reference
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        window.location.href = '{% url "dashboard" %}';
                    } else {
                        alert('Payment verification failed. Please contact support.');
                    }
                });
            },
            onClose: function() {
                alert('Payment window closed');
            }
        });
        handler.openIframe();
    });
</script>
{% endblock %}
